spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:open test token}
  jwt:
    secret: ${JWT_SECRET}
    expiration_minutes: 30