<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Авторизация в Telegram Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0088ff, #00c6ff);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h2 {
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            font-size: 16px;
            margin-top: 20px;
        }
        .error {
            color: #ff4d4d;
            font-weight: bold;
        }
        .success {
            color: #4dff4d;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Авторизация через Telegram...</h2>
    <div class="loader"></div>
    <div id="response"></div>
</div>
<script>
    const initData = window.Telegram.WebApp.initData || "";
    console.log("initData:", initData);

    fetch("/api/auth/by-telegram", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `initData=${encodeURIComponent(initData)}`
    })
        .then(res => res.text())
        .then(text => {
            console.log("Response:", text);
            const responseDiv = document.getElementById("response");
            responseDiv.innerHTML = `<p class="success">Сервер ответил: ${text}</p>`;
            document.querySelector(".loader").style.display = "none";
        })
        .catch(err => {
            console.error(err);
            const responseDiv = document.getElementById("response");
            responseDiv.innerHTML = `<p class="error">Ошибка: ${err}</p>`;
            document.querySelector(".loader").style.display = "none";
        });
</script>
</body>
</html>
